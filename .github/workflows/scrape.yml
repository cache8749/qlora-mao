name: Scrape & Process Mao's Writings

on:
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 – Scrape marxists.org and collect raw article JSON files
  # ─────────────────────────────────────────────────────────────────────────────
  scrape:
    name: Scrape articles
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Run scraper
        run: uv run python scraper.py

      - name: Show scrape summary
        run: |
          echo "Articles scraped: $(ls raw_articles/*.json 2>/dev/null | grep -v manifest | wc -l)"
          cat raw_articles/manifest.json | python -m json.tool | head -30

      - name: Upload raw articles as artifact
        uses: actions/upload-artifact@v7
        with:
          name: raw-articles
          path: raw_articles/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 – Process with Gemini and produce training_data.jsonl
  # ─────────────────────────────────────────────────────────────────────────────
  process:
    name: Process with Gemini
    runs-on: ubuntu-latest
    needs: scrape

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Download raw articles artifact
        uses: actions/download-artifact@v4
        with:
          name: raw-articles
          path: raw_articles/

      - name: Process articles with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: uv run python process_with_gemini.py

      - name: Show JSONL summary
        run: |
          total=$(wc -l < training_data.jsonl)
          cpt=$(grep -c '"text":' training_data.jsonl || true)
          sft=$(grep -c '"messages":' training_data.jsonl || true)
          echo "Total records : $total"
          echo "CPT records   : $cpt"
          echo "SFT records   : $sft"

      - name: Upload JSONL as artifact
        uses: actions/upload-artifact@v7
        with:
          name: training-data
          path: training_data.jsonl
          retention-days: 30

      - name: Create GitHub Release and upload JSONL
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "training-data-${{ github.run_number }}"
          name: "Training Data – Run ${{ github.run_number }}"
          body: |
            ## QLoRA Training Data

            Scraped from [marxists.org – Mao Zedong](https://www.marxists.org/chinese/maozedong/index.htm)
            (public domain writings).

            | Field | Value |
            |---|---|
            | Workflow run | ${{ github.run_number }} |
            | Triggered by | ${{ github.event_name }} |
            | Commit | ${{ github.sha }} |

            ### Contents
            `training_data.jsonl` contains two record types intended for use with Unsloth:

            **CPT records** – raw cleaned article text for continued pretraining.

            **SFT records** – multi-turn ChatML conversations in Mao Zedong's
            rhetorical style, generated by Gemini, suitable for supervised
            instruction fine-tuning with Unsloth.

            ### JSONL schema
            ```jsonc
            // CPT record (continued pretraining)
            {"text": "…"}

            // SFT record (supervised fine-tuning, ChatML format)
            {
              "messages": [
                {"role": "system",    "content": "You are Mao Zedong…"},
                {"role": "user",      "content": "…"},
                {"role": "assistant", "content": "…"}
              ]
            }
            ```
          files: training_data.jsonl
          token: ${{ secrets.GITHUB_TOKEN }}
