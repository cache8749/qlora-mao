name: Scrape & Process Mao's Writings

# Run on demand or on the first day of every month
on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 1 * *"   # 02:00 UTC on the 1st of each month

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 – Scrape marxists.org and collect raw article JSON files
  # ─────────────────────────────────────────────────────────────────────────────
  scrape:
    name: Scrape articles
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Show scrape summary
        run: |
          echo "Articles scraped: $(ls raw_articles/*.json 2>/dev/null | grep -v manifest | wc -l)"
          cat raw_articles/manifest.json | python -m json.tool | head -30

      - name: Upload raw articles as artifact
        uses: actions/upload-artifact@v4
        with:
          name: raw-articles
          path: raw_articles/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 – Process with Gemini and produce training_data.jsonl
  # ─────────────────────────────────────────────────────────────────────────────
  process:
    name: Process with Gemini
    runs-on: ubuntu-latest
    needs: scrape

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download raw articles artifact
        uses: actions/download-artifact@v4
        with:
          name: raw-articles
          path: raw_articles/

      - name: Process articles with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python process_with_gemini.py

      - name: Show JSONL summary
        run: |
          total=$(wc -l < training_data.jsonl)
          text=$(grep -c '"type":"text"' training_data.jsonl || true)
          qa=$(grep -c '"type":"qa"' training_data.jsonl || true)
          echo "Total records : $total"
          echo "Text records  : $text"
          echo "Q&A records   : $qa"

      - name: Upload JSONL as artifact
        uses: actions/upload-artifact@v4
        with:
          name: training-data
          path: training_data.jsonl
          retention-days: 30

      - name: Create GitHub Release and upload JSONL
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "training-data-${{ github.run_number }}"
          name: "Training Data – Run ${{ github.run_number }}"
          body: |
            ## QLoRA Training Data

            Scraped from [marxists.org – Mao Zedong](https://www.marxists.org/chinese/maozedong/index.htm)
            (public domain writings).

            | Field | Value |
            |---|---|
            | Workflow run | ${{ github.run_number }} |
            | Triggered by | ${{ github.event_name }} |
            | Commit | ${{ github.sha }} |

            ### Contents
            `training_data.jsonl` contains two record types:

            **Text-completion records** (`"type":"text"`) – cleaned article text,
            ready for causal language-model training.

            **Instruction records** (`"type":"qa"`) – question/answer pairs
            generated by Gemini in Mao Zedong's rhetorical style, suitable for
            instruction fine-tuning (Alpaca-style).

            ### JSONL schema
            ```jsonc
            // text record
            {"type":"text","text":"…","source_url":"…","title":"…"}

            // Q&A record
            {"type":"qa","instruction":"…","input":"","output":"…","source_url":"…","title":"…"}
            ```
          files: training_data.jsonl
          token: ${{ secrets.GITHUB_TOKEN }}
